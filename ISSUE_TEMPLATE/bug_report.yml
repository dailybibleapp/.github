name: 🐞 Bug report
description: Report a problem so we can fix it
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        ⚠️ **Do not include sensitive data** (credentials, API keys, tokens,
        personal data, or internal URLs). Redact logs and screenshots before posting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include redacted logs if helpful.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / environment
      description: Affected version, OS, browser, or runtime.
      placeholder: "e.g. v1.2.0, macOS 14, Node 20"
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I removed all sensitive data from this report.
          required: true
