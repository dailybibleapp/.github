# Reusable secret-scanning workflow.
#
# Other repositories in the organization can call it:
#
#   jobs:
#     secrets:
#       uses: dailybibleapp/.github/.github/workflows/secret-scan.yml@main
#
# It also runs on pushes and pull requests to this repository.
name: Secret scan

on:
  workflow_call:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
